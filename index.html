<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>
        <link rel="stylesheet" href="./css/style.css" />
        <link rel="stylesheet" href="./css/fonts.css" />
    </head>
    <body>
        <header class="header-main">
            <section class="">
                <img class="header-main-icon" src="./assets/icon/icon.svg" alt="icon fotogram" />
                <img class="header-main-headline" src="./assets/icon/fotogram-header-title.svg" alt="" />
            </section>
        </header>
        <main>
            <section class="main-foto-container">
                <h1>Your personal photo album</h1>
                <section class="main-foto-container-images">
                    <img src="./assets/img/cat.jpg" alt="A cat looking into the camera" />
                    <img src="./assets/img/corgi.jpg" alt="A corgi looking into the camera" />
                    <img src="./assets/img/cow.jpg" alt="A cow looking into the camera" />
                    <img src="./assets/img/dog.jpg" alt="A dog on white background" />
                    <img src="./assets/img/dog_and_lake.jpg" alt="A dog looking into a lake" />
                    <img src="./assets/img/flower.jpg" alt="A purple flower" />
                    <img src="./assets/img/island_on_river.jpg" alt="A small Island on a quiet lake" />
                    <img src="./assets/img/mountains_and_river.jpg" alt="A river floating through mountain landscape" />
                    <img src="./assets/img/rocks_and_desert.jpg" alt="Rocks in a desert" />
                    <img src="./assets/img/sunny_forest.jpg" alt="Sun shining over a forest" />
                </section>
            </section>
        </main>
        <footer class="footer-main">
            <div class="footer-main-copyright-container">
                <div>
                    <img src="./assets/icon/da-icon.svg" alt="Icon Developer Akademie" />
                    <img src="./assets/icon/da-text.svg" alt="Developer Akademie" />
                </div>
                <img src="./assets/icon/da-copyright-text.svg" alt="Develper Akademie Copyright" />
            </div>
        </footer>
    </body>
</html>
