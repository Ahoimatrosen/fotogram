<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram playground</title>
        <link rel="stylesheet" href="./css/style.css" />
        <link rel="stylesheet" href="./css/fonts.css" />
        <script defer src="./scripts/fotoalbum.js"></script>
    </head>

    <body onload="renderImages()">
        <!-- main header -->
        <header class="header-main">
            <section>
                <img class="header-main-icon" src="./assets/icon/fotogram-icon.png" alt="icon and title fotogram" />
            </section>
        </header>
        <!-- main content -->
        <main class="main-foto-container">
            <h1>Your personal photo album</h1>

            <div id="fotoContainer" class="main-foto-container-images"></div>
        </main>
        <!-- main footer -->
        <footer class="footer-main">
            <section class="footer-main-copyright-container">
                <section>
                    <img src="./assets/icon/da-icon.svg" alt="Icon Developer Akademie" />
                    <img src="./assets/icon/da-text.svg" alt="Developer Akademie" />
                </section>
                <img src="./assets/icon/da-copyright-text.svg" alt="Develper Akademie Copyright" />
            </section>
        </footer>
        <dialog onclick="closeFotogram()" id="fotogramDialog">
            <div id="fotogramDialogContent" onclick="bubblingProtection(event)">
                <header>
                    <h2 class="dialog-title-mobile" id="fotogramTitle"></h2>
                    <img onclick="closeFotogram()" class="close-button" src="./assets/icon/close-icon.png" alt="" />
                </header>
                <section id="fotogramDialogImg"></section>
                <footer id="fotogramDialogFooter"></footer>
            </div>
        </dialog>
    </body>
</html>
